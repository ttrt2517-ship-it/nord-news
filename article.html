<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завантаження...</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/" class="logo">
                <span class="logo-icon">🇳🇴</span>
                <span class="logo-text">Норд</span>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container" style="max-width: 800px;">
            <div id="article-content">
                <div class="loading">Завантаження статті...</div>
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        if (!slug) {
            document.getElementById('article-content').innerHTML = '<p>Статтю не знайдено</p>';
        } else {
            fetch('data/articles.json')
                .then(r => r.json())
                .then(articles => {
                    const article = articles.find(a => a.slug === slug);
                    if (!article) {
                        document.getElementById('article-content').innerHTML = '<p>Статтю не знайдено</p>';
                        return;
                    }

                    document.title = article.title;
                    document.getElementById('article-content').innerHTML = `
                        <article class="article-full">
                            <h1 style="font-size: 2rem; margin-bottom: 1rem;">${article.title}</h1>
                            <div style="color: #64748b; margin-bottom: 2rem;">
                                📰 ${article.source_name} • ${new Date(article.published_at).toLocaleDateString('uk-UA')}
                            </div>
                            <img src="${article.image}" alt="${article.title}" style="width: 100%; border-radius: 0.75rem; margin-bottom: 2rem;">
                            <div style="font-size: 1.125rem; line-height: 1.8; white-space: pre-wrap;">${article.content}</div>
                            <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #e2e8f0;">
                                <a href="${article.original_url}" target="_blank" style="color: #64748b; font-size: 0.875rem;">
                                    📎 Джерело: ${article.source_name} ↗
                                </a>
                            </div>
                            <div style="margin-top: 2rem;">
                                <a href="/" class="btn btn-primary">← Всі новини</a>
                            </div>
                        </article>
                    `;
                })
                .catch(() => {
                    document.getElementById('article-content').innerHTML = '<p>Помилка завантаження</p>';
                });
        }
    </script>
</body>
</html>
